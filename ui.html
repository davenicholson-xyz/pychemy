<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wallhaven Gallery</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #252525;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --text-muted: #7a7a7a;
    --accent: #7c6af7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  ::-webkit-scrollbar { display: none; }
  html { scrollbar-width: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
  }

  /* Gallery */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--thumb-size, 240px), 1fr));
    gap: 8px;
    padding: 8px;
  }

  .card {
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    background: var(--surface);
  }

  .card img {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    transition: transform 0.2s;
  }
  .card:hover img { transform: scale(1.03); }
  .card.selected { outline: 2px solid var(--accent); outline-offset: -2px; }

  /* Skeleton */
  .skeleton-card {
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface2);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .skeleton-img {
    background: var(--surface);
    width: 100%;
    aspect-ratio: 16 / 9;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Bottom loader */
  #bottom-loader {
    display: none;
    justify-content: center;
    padding: 24px;
  }
  #bottom-loader.visible { display: flex; }
  #bottom-loader .spin {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #lightbox.visible { display: flex; }

  #lightbox-backdrop {
    position: absolute;
    inset: 0;
    cursor: zoom-out;
  }

  #lightbox-img-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #lightbox-img {
    max-width: 95vw;
    max-height: 95vh;
    border-radius: 4px;
    display: block;
    object-fit: contain;
  }

  #lightbox-spinner {
    position: absolute;
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .lb-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(26,26,26,0.7);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px;
    height: 56px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: background 0.15s;
    user-select: none;
  }
  .lb-nav:hover { background: rgba(124,106,247,0.4); }
  .lb-nav:disabled { opacity: 0.15; cursor: default; }
  #lb-prev { left: 10px; }
  #lb-next { right: 10px; }

  /* Collections modal */
  #collections-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    align-items: flex-start;
    justify-content: center;
    padding-top: 20vh;
  }
  #collections-modal.visible { display: flex; }

  #collections-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-width: 320px;
    max-width: 90vw;
    overflow: hidden;
  }

  .coll-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    cursor: pointer;
    gap: 24px;
    border-bottom: 1px solid var(--border);
  }
  .coll-item:last-child { border-bottom: none; }
  .coll-item.selected { background: var(--surface2); color: var(--accent); }
  .coll-item:hover { background: var(--surface2); }
  .coll-count { color: var(--text-muted); font-size: 12px; }

  /* Search modal */
  #search-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    align-items: flex-start;
    justify-content: center;
    padding-top: 20vh;
  }
  #search-modal.visible { display: flex; }

  #search-input {
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    font-size: 18px;
    padding: 14px 18px;
    border-radius: 8px;
    width: 480px;
    max-width: 90vw;
    outline: none;
  }

  /* Help overlay */
  #help-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 3000;
    align-items: center;
    justify-content: center;
  }
  #help-modal.visible { display: flex; }

  #help-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px 16px;
    min-width: 420px;
    max-width: 90vw;
  }

  .help-heading {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .help-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px 24px;
  }

  .help-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 7px;
  }

  .help-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .help-keys {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
    min-width: 62px;
  }

  kbd {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid #444;
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
    font-family: monospace;
    color: var(--text);
    line-height: 1.6;
  }

  .help-footer {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }
  .help-footer kbd { color: var(--text-muted); }
</style>
</head>
<body>

<div class="gallery" id="gallery"></div>
<div id="bottom-loader"><div class="spin"></div></div>

<div id="collections-modal">
  <div id="collections-list"></div>
</div>

<div id="search-modal">
  <input id="search-input" type="text" placeholder="Search…" autocomplete="off" spellcheck="false" />
</div>

<div id="help-modal">
  <div id="help-box">
    <div class="help-heading">Keybindings</div>
    <div class="help-grid">
      <div>
        <div class="help-section-label">Sorting</div>
        <div class="help-row"><span class="help-keys"><kbd>H</kbd></span>Hot</div>
        <div class="help-row"><span class="help-keys"><kbd>T</kbd></span>Toplist</div>
        <div class="help-row"><span class="help-keys"><kbd>L</kbd></span>Latest</div>
        <div class="help-row"><span class="help-keys"><kbd>R</kbd></span>Random (re-roll)</div>
        <div class="help-row"><span class="help-keys"><kbd>S</kbd></span>Search</div>
        <div class="help-row"><span class="help-keys"><kbd>C</kbd></span>Collections</div>
      </div>
      <div>
        <div class="help-section-label">Navigation</div>
        <div class="help-row"><span class="help-keys"><kbd>h</kbd><kbd>j</kbd><kbd>k</kbd><kbd>l</kbd></span>Move</div>
        <div class="help-row"><span class="help-keys"><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd></span>Move</div>
      </div>
      <div>
        <div class="help-section-label">Actions</div>
        <div class="help-row"><span class="help-keys"><kbd>Enter</kbd></span>Run script</div>
        <div class="help-row"><span class="help-keys"><kbd>Esc</kbd></span>Quit</div>
      </div>
    </div>
    <div class="help-footer">Press <kbd>?</kbd> or <kbd>Esc</kbd> to close</div>
  </div>
</div>

<div id="lightbox">
  <div id="lightbox-backdrop"></div>
  <button class="lb-nav" id="lb-prev" onclick="lbNav(-1)">&#8592;</button>
  <button class="lb-nav" id="lb-next" onclick="lbNav(1)">&#8594;</button>
  <div id="lightbox-img-wrap">
    <div id="lightbox-spinner"></div>
    <img id="lightbox-img" src="" alt="" />
  </div>
</div>

<script>
  let wallpapers = [];
  let lbIndex = 0;
  let cfg = {};
  let selectedIndex = -1;
  let currentPage = 0;
  let lastPage = 1;
  let isLoading = false;
  let currentSorting = 'date_added';
  let currentSeed = '';
  let currentQuery = '';
  let collectionMode = false;
  let currentCollection = null;
  let collectionsData = [];
  let collSelectedIdx = 0;

  // ── Skeleton ──────────────────────────────────────────────────────────────
  function showSkeletons() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    selectedIndex = -1;
    for (let i = 0; i < 20; i++) {
      const card = document.createElement('div');
      card.className = 'skeleton-card';
      const img = document.createElement('div');
      img.className = 'skeleton-img';
      card.appendChild(img);
      gallery.appendChild(card);
    }
  }

  // ── Cards ─────────────────────────────────────────────────────────────────
  function makeCard(wp, idx) {
    const card = document.createElement('div');
    card.className = 'card';
    const img = document.createElement('img');
    img.src = wp.thumbs?.large || wp.thumbs?.original || '';
    img.alt = wp.id || '';
    img.loading = 'lazy';
    card.appendChild(img);
    card.addEventListener('click', () => openLightbox(idx));
    return card;
  }

  function appendCards(data, startIdx) {
    const gallery = document.getElementById('gallery');
    data.forEach((wp, i) => gallery.appendChild(makeCard(wp, startIdx + i)));
  }

  function replaceGallery(data) {
    document.getElementById('gallery').innerHTML = '';
    selectedIndex = -1;
    appendCards(data, 0);
  }

  // ── Selection ─────────────────────────────────────────────────────────────
  function selectCard(idx) {
    const cards = document.querySelectorAll('.card');
    if (selectedIndex >= 0 && cards[selectedIndex]) {
      cards[selectedIndex].classList.remove('selected');
    }
    selectedIndex = idx;
    if (idx >= 0 && cards[idx]) {
      cards[idx].classList.add('selected');
      cards[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  function getColumnCount() {
    const cols = window.getComputedStyle(document.getElementById('gallery')).gridTemplateColumns;
    return cols.split(' ').length;
  }

  function navigate(dir) {
    if (!wallpapers.length) return;
    if (selectedIndex < 0) { selectCard(0); return; }

    const cols = getColumnCount();
    const n = wallpapers.length;
    const i = selectedIndex;

    const next = {
      left:  i % cols > 0                      ? i - 1    : -1,
      right: i % cols < cols - 1 && i + 1 < n  ? i + 1    : -1,
      up:    i - cols >= 0                      ? i - cols : -1,
      down:  i + cols < n                       ? i + cols : -1,
    }[dir];

    if (next >= 0) selectCard(next);
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function loadNextPage() {
    if (isLoading || currentPage >= lastPage) return;
    isLoading = true;

    const nextPage = currentPage + 1;
    if (nextPage > 1) document.getElementById('bottom-loader').classList.add('visible');

    let result;
    try {
      result = collectionMode && currentCollection
        ? await window.pywebview.api.fetch_collection(
            cfg.username,
            currentCollection.id,
            nextPage,
            cfg.api_key || '',
            cfg.purity || '100',
          )
        : await window.pywebview.api.fetch_wallpapers(
            nextPage,
            cfg.api_key || '',
            currentQuery || cfg.query || '',
            cfg.categories || '111',
            cfg.purity || '100',
            currentSorting,
            currentSeed,
            cfg['min-resolution'] || '',
          );
    } catch (err) {
      console.error('fetch failed:', err);
      isLoading = false;
      document.getElementById('bottom-loader').classList.remove('visible');
      return;
    }

    document.getElementById('bottom-loader').classList.remove('visible');

    if (result.success) {
      const incoming = result.data.data || [];
      const meta = result.data.meta;
      lastPage = meta?.last_page ?? nextPage;
      currentPage = nextPage;

      if (currentPage === 1) {
        wallpapers = incoming;
        replaceGallery(incoming);
      } else {
        const startIdx = wallpapers.length;
        wallpapers = wallpapers.concat(incoming);
        appendCards(incoming, startIdx);
      }
    }

    isLoading = false;
    maybeLoadMore();
  }

  // ── Infinite scroll ───────────────────────────────────────────────────────
  function maybeLoadMore() {
    const distFromBottom = document.documentElement.scrollHeight - window.scrollY - window.innerHeight;
    if (distFromBottom < 600 && currentPage < lastPage) loadNextPage();
  }

  window.addEventListener('scroll', maybeLoadMore);

  // ── Collections modal ────────────────────────────────────────────────────
  async function openCollections() {
    if (!cfg.username) return;
    const result = await window.pywebview.api.get_collections(cfg.username, cfg.api_key || '');
    if (!result.success || !result.data.length) return;
    if (result.data.length === 1) {
      loadCollection(result.data[0]);
      return;
    }
    collectionsData = result.data;
    collSelectedIdx = 0;
    renderCollectionsList();
    document.getElementById('collections-modal').classList.add('visible');
  }

  function renderCollectionsList() {
    const list = document.getElementById('collections-list');
    list.innerHTML = '';
    collectionsData.forEach((coll, idx) => {
      const item = document.createElement('div');
      item.className = 'coll-item' + (idx === collSelectedIdx ? ' selected' : '');
      item.innerHTML = `<span>${coll.label}</span><span class="coll-count">${coll.count}</span>`;
      item.addEventListener('click', () => {
        closeCollections();
        loadCollection(coll);
      });
      list.appendChild(item);
    });
  }

  function closeCollections() {
    document.getElementById('collections-modal').classList.remove('visible');
  }

  async function loadCollection(coll) {
    collectionMode = true;
    currentCollection = coll;
    currentPage = 0;
    lastPage = 1;
    wallpapers = [];
    showSkeletons();
    await loadNextPage();
  }

  document.getElementById('collections-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeCollections();
  });

  // ── Search modal ──────────────────────────────────────────────────────────
  function openSearch() {
    const modal = document.getElementById('search-modal');
    const input = document.getElementById('search-input');
    input.value = currentQuery;
    modal.classList.add('visible');
    input.focus();
    input.select();
  }

  function closeSearch() {
    document.getElementById('search-modal').classList.remove('visible');
  }

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = e.target.value.trim();
      closeSearch();
      if (q !== currentQuery) {
        currentQuery = q;
        currentPage = 0;
        lastPage = 1;
        wallpapers = [];
        showSkeletons();
        loadNextPage();
      }
    } else if (e.key === 'Escape') {
      closeSearch();
    }
    e.stopPropagation();
  });

  document.getElementById('search-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeSearch();
  });

  // ── Sorting ───────────────────────────────────────────────────────────────
  async function setSorting(sorting) {
    if (sorting === currentSorting && sorting !== 'random' && currentPage > 0 && !collectionMode) return;
    collectionMode = false;
    currentCollection = null;
    currentSorting = sorting;
    currentSeed = sorting === 'random' ? Math.random().toString(36).slice(2, 8) : '';
    currentQuery = cfg.query || '';
    currentPage = 0;
    lastPage = 1;
    wallpapers = [];
    showSkeletons();
    await loadNextPage();
  }

  // ── Lightbox ──────────────────────────────────────────────────────────────
  function openLightbox(idx) {
    lbIndex = idx;
    renderLightbox();
    document.getElementById('lightbox').classList.add('visible');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('visible');
    document.body.style.overflow = '';
    document.getElementById('lightbox-img').src = '';
  }

  function renderLightbox() {
    const wp = wallpapers[lbIndex];
    if (!wp) return;
    const img = document.getElementById('lightbox-img');
    const spinner = document.getElementById('lightbox-spinner');
    img.style.opacity = '0';
    spinner.style.display = 'block';
    img.onload = () => {
      spinner.style.display = 'none';
      img.style.opacity = '1';
      img.style.transition = 'opacity 0.2s';
    };
    img.src = wp.path || wp.thumbs?.original || '';
    document.getElementById('lb-prev').disabled = lbIndex <= 0;
    document.getElementById('lb-next').disabled = lbIndex >= wallpapers.length - 1;
  }

  function lbNav(dir) {
    const next = lbIndex + dir;
    if (next < 0 || next >= wallpapers.length) return;
    lbIndex = next;
    renderLightbox();
  }

  document.getElementById('lightbox-backdrop').addEventListener('click', closeLightbox);

  // ── Help overlay ─────────────────────────────────────────────────────────
  function openHelp()  { document.getElementById('help-modal').classList.add('visible'); }
  function closeHelp() { document.getElementById('help-modal').classList.remove('visible'); }
  document.getElementById('help-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeHelp();
  });

  // ── Keyboard ──────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    const helpOpen = document.getElementById('help-modal').classList.contains('visible');
    if (helpOpen) {
      if (e.key === 'Escape' || e.key === '?') closeHelp();
      return;
    }

    const collOpen = document.getElementById('collections-modal').classList.contains('visible');

    if (collOpen) {
      if (e.key === 'Escape') { closeCollections(); return; }
      if (e.key === 'ArrowDown' || e.key === 'j') {
        collSelectedIdx = Math.min(collSelectedIdx + 1, collectionsData.length - 1);
        renderCollectionsList();
        return;
      }
      if (e.key === 'ArrowUp' || e.key === 'k') {
        collSelectedIdx = Math.max(collSelectedIdx - 1, 0);
        renderCollectionsList();
        return;
      }
      if (e.key === 'Enter') {
        closeCollections();
        loadCollection(collectionsData[collSelectedIdx]);
        return;
      }
      return;
    }

    const lbOpen = document.getElementById('lightbox').classList.contains('visible');

    if (lbOpen) {
      if (e.key === 'Escape')                    closeLightbox();
      if (e.key === 'ArrowLeft'  || e.key === 'h') lbNav(-1);
      if (e.key === 'ArrowRight' || e.key === 'l') lbNav(1);
      return;
    }

    if (e.key === '?') { e.preventDefault(); openHelp(); return; }
    if (e.key === 'S') { e.preventDefault(); openSearch(); return; }
    if (e.key === 'C') { e.preventDefault(); openCollections(); return; }
    if (e.key === 'H') { setSorting('hot');        return; }
    if (e.key === 'T') { setSorting('toplist');    return; }
    if (e.key === 'L') { setSorting('date_added'); return; }
    if (e.key === 'R') { setSorting('random');     return; }

    const dirMap = {
      ArrowLeft: 'left',  h: 'left',
      ArrowRight: 'right', l: 'right',
      ArrowUp: 'up',      k: 'up',
      ArrowDown: 'down',  j: 'down',
    };
    const dir = dirMap[e.key];

    if (dir) {
      e.preventDefault();
      navigate(dir);
    } else if (e.key === 'Enter' && selectedIndex >= 0) {
      e.preventDefault();
      const url = wallpapers[selectedIndex]?.path;
      if (url) window.pywebview.api.run_script(url);
    } else if (e.key === 'Escape') {
      window.pywebview.api.close();
    }
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  window.addEventListener('pywebviewready', async () => {
    cfg = await window.pywebview.api.get_config();
    currentQuery = cfg.query || '';
    const thumbPx = { sm: '160px', m: '240px', l: '320px', xl: '440px' };
    document.documentElement.style.setProperty('--thumb-size', thumbPx[cfg['thumb-size']] || '240px');
    showSkeletons();
    await loadNextPage();
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wallhaven Gallery</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #252525;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --text-muted: #7a7a7a;
    --accent: #7c6af7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  ::-webkit-scrollbar { display: none; }
  html { scrollbar-width: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
  }

  /* Gallery */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--thumb-size, 240px), 1fr));
    gap: 8px;
    padding: 8px;
  }

  .card {
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    background: var(--surface);
  }

  .card img {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    transition: transform 0.2s;
  }
  .card:hover img { transform: scale(1.03); }
  .card.selected { outline: 2px solid var(--accent); outline-offset: -2px; }

  /* Skeleton */
  .skeleton-card {
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface2);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .skeleton-img {
    background: var(--surface);
    width: 100%;
    aspect-ratio: 16 / 9;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Bottom loader */
  #bottom-loader {
    display: none;
    justify-content: center;
    padding: 24px;
  }
  #bottom-loader.visible { display: flex; }
  #bottom-loader .spin {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Collections panel — drops from top */
  #collections-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 2000;
    align-items: flex-start;
    justify-content: center;
  }
  #collections-modal.visible { display: flex; }

  #collections-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    width: 300px;
    max-width: 90vw;
    max-height: 60vh;
    overflow-y: auto;
    box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    animation: collDropDown 0.16s ease;
  }

  @keyframes collDropDown {
    from { transform: translateY(-8px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .coll-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 14px;
    cursor: pointer;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .coll-item:last-child { border-bottom: none; }
  .coll-item.selected { background: var(--surface2); color: var(--accent); }
  .coll-item:hover { background: var(--surface2); }
  .coll-count { color: var(--text-muted); font-size: 11px; }

  /* Search modal */
  #search-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding-bottom: 12vh;
  }
  #search-modal.visible { display: flex; }

  #search-box {
    width: 540px;
    max-width: 90vw;
    animation: searchIn 0.14s ease;
  }
  @keyframes searchIn {
    from { transform: translateY(-8px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  #search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  #search-icon {
    position: absolute;
    left: 16px;
    color: var(--text-muted);
    pointer-events: none;
    flex-shrink: 0;
  }
  #search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    padding: 12px 16px 12px 44px;
    border-radius: 10px;
    outline: none;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--accent);
  }
  #search-hint {
    margin-top: 10px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.4;
    letter-spacing: 0.03em;
  }

  /* Lightbox */
  #lightbox-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 2500;
  }
  #lightbox-modal.visible { display: block; }

  #lightbox-image-area {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  #lightbox-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  #lightbox-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 55%, transparent 100%);
    padding: 72px 28px 22px;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .lb-top-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .lb-resolution {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.5px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
  }
  .lb-ratio {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-left: 7px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }
  .lb-stats {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    flex-shrink: 0;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }
  .lb-stat-val { color: #fff; font-weight: 500; }
  .lb-chips-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 5px;
  }
  .lb-chip {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    backdrop-filter: blur(6px);
  }
  .lb-chip.accent { color: var(--accent); border-color: var(--accent); background: rgba(124,106,247,0.15); }
  .lb-colors {
    display: flex;
    gap: 4px;
    margin-left: 4px;
    flex-wrap: wrap;
    align-items: center;
  }
  .lb-color-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .lb-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .lb-tag {
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 11px;
    color: rgba(255,255,255,0.48);
    backdrop-filter: blur(6px);
  }
  .lb-meta {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }

  /* Help overlay */
  #help-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 3000;
    align-items: center;
    justify-content: center;
  }
  #help-modal.visible { display: flex; }

  #help-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px 16px;
    min-width: 420px;
    max-width: 90vw;
  }

  .help-heading {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .help-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px 24px;
  }

  .help-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 7px;
  }

  .help-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .help-keys {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
    min-width: 62px;
  }

  kbd {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid #444;
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
    font-family: monospace;
    color: var(--text);
    line-height: 1.6;
  }

  .help-footer {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }
  .help-footer kbd { color: var(--text-muted); }

  /* Status bar */
  #statusbar {
    position: fixed;
    bottom: 10px;
    right: 12px;
    background: rgba(26,26,26,0.88);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 9px;
    font-size: 11px;
    color: var(--text-muted);
    pointer-events: none;
    z-index: 100;
  }
  #statusbar .mode { color: var(--accent); }
</style>
</head>
<body>

<div class="gallery" id="gallery"></div>
<div id="bottom-loader"><div class="spin"></div></div>

<div id="collections-modal">
  <div id="collections-list"></div>
</div>

<div id="search-modal">
  <div id="search-box">
    <div id="search-wrap">
      <svg id="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search wallpapers…" autocomplete="off" spellcheck="false" />
    </div>
    <div id="search-hint">Enter to search &nbsp;·&nbsp; Esc to cancel</div>
  </div>
</div>

<div id="lightbox-modal">
  <div id="lightbox-image-area">
    <img id="lightbox-img" src="" alt="" />
  </div>
  <div id="lightbox-info"></div>
</div>

<div id="help-modal">
  <div id="help-box">
    <div class="help-heading">Keybindings</div>
    <div class="help-grid">
      <div>
        <div class="help-section-label">Sorting</div>
        <div class="help-row"><span class="help-keys"><kbd>H</kbd></span>Hot</div>
        <div class="help-row"><span class="help-keys"><kbd>T</kbd></span>Toplist</div>
        <div class="help-row"><span class="help-keys"><kbd>L</kbd></span>Latest</div>
        <div class="help-row"><span class="help-keys"><kbd>R</kbd></span>Random (re-roll)</div>
        <div class="help-row"><span class="help-keys"><kbd>S</kbd></span>Search</div>
        <div class="help-row"><span class="help-keys"><kbd>C</kbd></span>Collections</div>
      </div>
      <div>
        <div class="help-section-label">Navigation</div>
        <div class="help-row"><span class="help-keys"><kbd>←</kbd><kbd>h</kbd></span>Left</div>
        <div class="help-row"><span class="help-keys"><kbd>→</kbd><kbd>l</kbd></span>Right</div>
        <div class="help-row"><span class="help-keys"><kbd>↑</kbd><kbd>k</kbd></span>Up</div>
        <div class="help-row"><span class="help-keys"><kbd>↓</kbd><kbd>j</kbd></span>Down</div>
      </div>
      <div>
        <div class="help-section-label">Actions</div>
        <div class="help-row"><span class="help-keys"><kbd>Enter</kbd></span>Run script</div>
        <div class="help-row"><span class="help-keys"><kbd>p</kbd></span>Preview (lightbox)</div>
        <div class="help-row"><span class="help-keys"><kbd>o</kbd></span>Open in browser</div>
        <div class="help-row"><span class="help-keys"><kbd>Esc</kbd></span>Quit</div>
      </div>
    </div>
    <div class="help-footer">Press <kbd>?</kbd> or <kbd>Esc</kbd> to close</div>
  </div>
</div>

<div id="statusbar"></div>

<script>
  let wallpapers = [];
  let cfg = {};
  let selectedIndex = -1;
  let currentPage = 0;
  let lastPage = 1;
  let isLoading = false;
  let currentSorting = 'date_added';
  let currentSeed = '';
  let currentQuery = '';
  let collectionMode = false;
  let currentCollection = null;
  let collectionsData = [];
  let collSelectedIdx = 0;

  // ── Skeleton ──────────────────────────────────────────────────────────────
  function showSkeletons() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    selectedIndex = -1;
    for (let i = 0; i < 20; i++) {
      const card = document.createElement('div');
      card.className = 'skeleton-card';
      const img = document.createElement('div');
      img.className = 'skeleton-img';
      card.appendChild(img);
      gallery.appendChild(card);
    }
  }

  // ── Cards ─────────────────────────────────────────────────────────────────
  function makeCard(wp, idx) {
    const card = document.createElement('div');
    card.className = 'card';
    const img = document.createElement('img');
    img.src = wp.thumbs?.large || wp.thumbs?.original || '';
    img.alt = wp.id || '';
    img.loading = 'lazy';
    card.appendChild(img);
    card.addEventListener('click', () => {
      const url = wp.path;
      if (url) window.pywebview.api.run_script(url);
    });
    return card;
  }

  function appendCards(data, startIdx) {
    const gallery = document.getElementById('gallery');
    data.forEach((wp, i) => gallery.appendChild(makeCard(wp, startIdx + i)));
  }

  function replaceGallery(data) {
    document.getElementById('gallery').innerHTML = '';
    selectedIndex = -1;
    appendCards(data, 0);
  }

  // ── Selection ─────────────────────────────────────────────────────────────
  function selectCard(idx) {
    const cards = document.querySelectorAll('.card');
    if (selectedIndex >= 0 && cards[selectedIndex]) {
      cards[selectedIndex].classList.remove('selected');
    }
    selectedIndex = idx;
    if (idx >= 0 && cards[idx]) {
      cards[idx].classList.add('selected');
      cards[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  function getColumnCount() {
    const cols = window.getComputedStyle(document.getElementById('gallery')).gridTemplateColumns;
    return cols.split(' ').length;
  }

  function navigate(dir) {
    if (!wallpapers.length) return;
    if (selectedIndex < 0) { selectCard(0); return; }

    const cols = getColumnCount();
    const n = wallpapers.length;
    const i = selectedIndex;

    const next = {
      left:  i % cols > 0                      ? i - 1    : -1,
      right: i % cols < cols - 1 && i + 1 < n  ? i + 1    : -1,
      up:    i - cols >= 0                      ? i - cols : -1,
      down:  i + cols < n                       ? i + cols : -1,
    }[dir];

    if (next >= 0) selectCard(next);
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function loadNextPage() {
    if (isLoading || currentPage >= lastPage) return;
    isLoading = true;

    const nextPage = currentPage + 1;
    if (nextPage > 1) document.getElementById('bottom-loader').classList.add('visible');

    let result;
    try {
      result = collectionMode && currentCollection
        ? await window.pywebview.api.fetch_collection(
            cfg.username,
            currentCollection.id,
            nextPage,
            cfg.api_key || '',
            cfg.purity || '100',
          )
        : await window.pywebview.api.fetch_wallpapers(
            nextPage,
            cfg.api_key || '',
            currentQuery || cfg.query || '',
            cfg.categories || '111',
            cfg.purity || '100',
            currentSorting,
            currentSeed,
            cfg['min-resolution'] || '',
          );
    } catch (err) {
      console.error('fetch failed:', err);
      isLoading = false;
      document.getElementById('bottom-loader').classList.remove('visible');
      return;
    }

    document.getElementById('bottom-loader').classList.remove('visible');

    if (result.success) {
      const incoming = result.data.data || [];
      const meta = result.data.meta;
      lastPage = meta?.last_page ?? nextPage;
      currentPage = nextPage;

      if (currentPage === 1) {
        wallpapers = incoming;
        replaceGallery(incoming);
      } else {
        const startIdx = wallpapers.length;
        wallpapers.push(...incoming);
        appendCards(incoming, startIdx);
      }
    }

    isLoading = false;
    updateStatus();
    maybeLoadMore();
  }

  // ── Infinite scroll ───────────────────────────────────────────────────────
  function maybeLoadMore() {
    const distFromBottom = document.documentElement.scrollHeight - window.scrollY - window.innerHeight;
    if (distFromBottom < 600 && currentPage < lastPage) loadNextPage();
  }

  let _scrollPending = false;
  window.addEventListener('scroll', () => {
    if (_scrollPending) return;
    _scrollPending = true;
    requestAnimationFrame(() => { _scrollPending = false; maybeLoadMore(); });
  });

  // ── Collections modal ────────────────────────────────────────────────────
  async function openCollections() {
    if (!cfg.username) return;
    const result = await window.pywebview.api.get_collections(cfg.username, cfg.api_key || '');
    if (!result.success || !result.data.length) return;
    if (result.data.length === 1) {
      loadCollection(result.data[0]);
      return;
    }
    collectionsData = result.data;
    collSelectedIdx = 0;
    renderCollectionsList();
    document.getElementById('collections-modal').classList.add('visible');
  }

  function renderCollectionsList() {
    const list = document.getElementById('collections-list');
    list.innerHTML = '';
    collectionsData.forEach((coll, idx) => {
      const item = document.createElement('div');
      item.className = 'coll-item' + (idx === collSelectedIdx ? ' selected' : '');
      item.innerHTML = `<span>${coll.label}</span><span class="coll-count">${coll.count}</span>`;
      item.addEventListener('click', () => {
        closeCollections();
        loadCollection(coll);
      });
      list.appendChild(item);
    });
  }

  function updateCollectionSelection(prevIdx, nextIdx) {
    const items = document.querySelectorAll('.coll-item');
    if (items[prevIdx]) items[prevIdx].classList.remove('selected');
    if (items[nextIdx]) {
      items[nextIdx].classList.add('selected');
      items[nextIdx].scrollIntoView({ block: 'nearest' });
    }
  }

  function closeCollections() {
    document.getElementById('collections-modal').classList.remove('visible');
  }

  async function loadCollection(coll) {
    collectionMode = true;
    currentCollection = coll;
    currentPage = 0;
    lastPage = 1;
    wallpapers = [];
    updateStatus();
    showSkeletons();
    await loadNextPage();
  }

  document.getElementById('collections-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeCollections();
  });

  // ── Search modal ──────────────────────────────────────────────────────────
  function openSearch() {
    const modal = document.getElementById('search-modal');
    const input = document.getElementById('search-input');
    input.value = currentQuery;
    modal.classList.add('visible');
    input.focus();
    input.select();
  }

  function closeSearch() {
    document.getElementById('search-modal').classList.remove('visible');
  }

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = e.target.value.trim();
      closeSearch();
      if (q !== currentQuery || collectionMode || !['relevance', 'random'].includes(currentSorting)) {
        currentQuery = q;
        collectionMode = false;
        currentCollection = null;
        currentSorting = 'relevance';
        currentSeed = '';
        currentPage = 0;
        lastPage = 1;
        wallpapers = [];
        updateStatus();
        showSkeletons();
        loadNextPage();
      }
    } else if (e.key === 'Escape') {
      closeSearch();
    }
    e.stopPropagation();
  });

  document.getElementById('search-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeSearch();
  });

  // ── Status bar ────────────────────────────────────────────────────────────
  function updateStatus() {
    let mode, detail = '';
    if (collectionMode && currentCollection) {
      mode = 'collection';
      detail = currentCollection.label;
    } else if (currentQuery) {
      mode = 'search';
      detail = currentQuery;
    } else {
      const labels = { hot: 'hot', toplist: 'toplist', date_added: 'latest', random: 'random', relevance: 'relevance' };
      mode = labels[currentSorting] || currentSorting;
    }
    const pageInfo = currentPage > 0 ? ` · ${currentPage}/${lastPage}` : '';
    document.getElementById('statusbar').innerHTML =
      `<span class="mode">${mode}</span>${detail ? ' · ' + detail : ''}${pageInfo}`;
  }

  // ── Sorting ───────────────────────────────────────────────────────────────
  async function setSorting(sorting) {
    if (sorting === currentSorting && sorting !== 'random' && currentPage > 0 && !collectionMode) return;
    collectionMode = false;
    currentCollection = null;
    currentSorting = sorting;
    currentSeed = sorting === 'random' ? Math.random().toString(36).slice(2, 8) : '';
    currentQuery = cfg.query || '';
    currentPage = 0;
    lastPage = 1;
    wallpapers = [];
    updateStatus();
    showSkeletons();
    await loadNextPage();
  }

  // ── Help overlay ─────────────────────────────────────────────────────────
  function fmtBytes(b) {
    if (!b) return '?';
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / (1024 * 1024)).toFixed(1) + ' MB';
  }
  function fmtNum(n) {
    if (!n && n !== 0) return '?';
    return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
  }

  function renderLightboxInfo(wp) {
    const res = wp.resolution || (wp.dimension_x && wp.dimension_y ? `${wp.dimension_x}x${wp.dimension_y}` : '');
    const ext = (wp.file_type || '').replace('image/', '').toUpperCase();
    const date = wp.created_at ? wp.created_at.slice(0, 10) : '';
    const tags = Array.isArray(wp.tags) ? wp.tags : [];
    const colors = Array.isArray(wp.colors) ? wp.colors : [];

    const chips = [
      wp.category  ? `<span class="lb-chip accent">${wp.category}</span>` : '',
      wp.purity    ? `<span class="lb-chip">${wp.purity}</span>` : '',
      ext          ? `<span class="lb-chip">${ext}</span>` : '',
      wp.file_size ? `<span class="lb-chip">${fmtBytes(wp.file_size)}</span>` : '',
    ].join('');

    const swatches = colors.length
      ? `<span class="lb-colors">${colors.map(c => `<span class="lb-color-swatch" style="background:${c}" title="${c}"></span>`).join('')}</span>`
      : '';

    const metaParts = [];
    if (wp.id) metaParts.push(wp.id);
    if (wp.uploader?.username) metaParts.push(wp.uploader.username);
    if (date) metaParts.push(date);

    document.getElementById('lightbox-info').innerHTML = `
      <div class="lb-top-row">
        <div>
          <span class="lb-resolution">${res || '—'}</span>
          ${wp.ratio ? `<span class="lb-ratio">${wp.ratio}</span>` : ''}
        </div>
        <div class="lb-stats">
          ${wp.views    != null ? `<span><span class="lb-stat-val">${fmtNum(wp.views)}</span> views</span>` : ''}
          ${wp.favorites != null ? `<span><span class="lb-stat-val">${fmtNum(wp.favorites)}</span> ♥</span>` : ''}
        </div>
      </div>
      ${(chips || swatches) ? `<div class="lb-chips-row">${chips}${swatches}</div>` : ''}
      ${tags.length ? `<div class="lb-tags">${tags.map(t => `<span class="lb-tag">${t.name}</span>`).join('')}</div>` : ''}
      ${metaParts.length ? `<div class="lb-meta">${metaParts.join(' · ')}</div>` : ''}
    `;
  }

  async function openLightbox(wp) {
    const img = document.getElementById('lightbox-img');
    img.onerror = null;
    img.src = wp.path || '';
    img.onerror = async () => {
      img.onerror = null;
      const result = await window.pywebview.api.fetch_image(wp.path, cfg.api_key || '');
      img.src = result.success ? result.data_url : (wp.thumbs?.large || wp.thumbs?.original || '');
    };

    renderLightboxInfo(wp);
    document.getElementById('lightbox-modal').classList.add('visible');

    try {
      const result = await window.pywebview.api.fetch_wallpaper(wp.id, cfg.api_key || '');
      if (result.success) renderLightboxInfo(result.data);
    } catch (_) {}
  }
  function closeLightbox() {
    document.getElementById('lightbox-modal').classList.remove('visible');
    document.getElementById('lightbox-img').src = '';
  }
  document.getElementById('lightbox-image-area').addEventListener('click', closeLightbox);

  function openHelp()  { document.getElementById('help-modal').classList.add('visible'); }
  function closeHelp() { document.getElementById('help-modal').classList.remove('visible'); }
  document.getElementById('help-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeHelp();
  });

  // ── Keyboard ──────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    const lightboxOpen = document.getElementById('lightbox-modal').classList.contains('visible');
    if (lightboxOpen) {
      if (e.key === 'Escape' || e.key === 'p') closeLightbox();
      if (e.key === 'Enter' && selectedIndex >= 0) {
        const url = wallpapers[selectedIndex]?.path;
        if (url) window.pywebview.api.run_script(url);
      }
      return;
    }

    const helpOpen = document.getElementById('help-modal').classList.contains('visible');
    if (helpOpen) {
      if (e.key === 'Escape' || e.key === '?') closeHelp();
      return;
    }

    const collOpen = document.getElementById('collections-modal').classList.contains('visible');

    if (collOpen) {
      if (e.key === 'Escape') { closeCollections(); return; }
      if (e.key === 'ArrowDown' || e.key === 'j') {
        const prev = collSelectedIdx;
        collSelectedIdx = Math.min(collSelectedIdx + 1, collectionsData.length - 1);
        if (collSelectedIdx !== prev) updateCollectionSelection(prev, collSelectedIdx);
        return;
      }
      if (e.key === 'ArrowUp' || e.key === 'k') {
        const prev = collSelectedIdx;
        collSelectedIdx = Math.max(collSelectedIdx - 1, 0);
        if (collSelectedIdx !== prev) updateCollectionSelection(prev, collSelectedIdx);
        return;
      }
      if (e.key === 'Enter') {
        closeCollections();
        loadCollection(collectionsData[collSelectedIdx]);
        return;
      }
      return;
    }

    if (e.key === '?') { e.preventDefault(); openHelp(); return; }
    if (e.key === 'S') { e.preventDefault(); openSearch(); return; }
    if (e.key === 'C') { e.preventDefault(); openCollections(); return; }
    if (e.key === 'H') { setSorting('hot');        return; }
    if (e.key === 'T') { setSorting('toplist');    return; }
    if (e.key === 'L') { setSorting('date_added'); return; }
    if (e.key === 'R') { setSorting('random');     return; }

    const dirMap = {
      ArrowLeft: 'left',  h: 'left',
      ArrowRight: 'right', l: 'right',
      ArrowUp: 'up',      k: 'up',
      ArrowDown: 'down',  j: 'down',
    };
    const dir = dirMap[e.key];

    if (dir) {
      e.preventDefault();
      navigate(dir);
    } else if (e.key === 'Enter' && selectedIndex >= 0) {
      e.preventDefault();
      const url = wallpapers[selectedIndex]?.path;
      if (url) window.pywebview.api.run_script(url);
    } else if (e.key === 'p' && selectedIndex >= 0) {
      e.preventDefault();
      const wp = wallpapers[selectedIndex];
      if (wp?.path) openLightbox(wp);
    } else if (e.key === 'o' && selectedIndex >= 0) {
      e.preventDefault();
      const id = wallpapers[selectedIndex]?.id;
      if (id) window.pywebview.api.open_browser(`https://wallhaven.cc/w/${id}`);
    } else if (e.key === 'Escape') {
      window.pywebview.api.close();
    }
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  window.addEventListener('pywebviewready', async () => {
    cfg = await window.pywebview.api.get_config();
    currentQuery = cfg.query || '';
    if (cfg.sorting) {
      currentSorting = cfg.sorting;
    } else if (cfg.query) {
      currentSorting = 'random';
    }
    if (currentSorting === 'random') currentSeed = Math.random().toString(36).slice(2, 8);
    updateStatus();
    const thumbPx = { xs: '100px', sm: '160px', m: '240px', l: '320px', xl: '440px' };
    document.documentElement.style.setProperty('--thumb-size', thumbPx[cfg['thumb-size']] || '240px');
    if (cfg.collection && cfg.username) {
      const result = await window.pywebview.api.get_collections(cfg.username, cfg.api_key || '');
      const coll = result.success && result.data.find(c => c.label.toLowerCase() === cfg.collection.toLowerCase());
      if (coll) { await loadCollection(coll); return; }
    }
    showSkeletons();
    await loadNextPage();
  });
</script>
</body>
</html>
